<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>لوحة المتابعة</title>
<style>
  :root{
    --bg:#f6f8fb; --card:#ffffff; --ink:#0f172a; --muted:#64748b; --line:#eaeef5;
    --accent:#4f46e5; --accent-weak:rgba(79,70,229,.10);
    --good:#16a34a; --good-weak:rgba(22,163,74,.12);
    --warn:#d97706; --warn-weak:rgba(217,119,6,.13);
    --bad:#dc2626;  --bad-weak:rgba(220,38,38,.12);
    --blue:#2563eb; --blue-weak:rgba(37,99,235,.12);
    --violet:#7c3aed; --violet-weak:rgba(124,58,237,.12);
    --slate-weak:rgba(100,116,139,.12);
    --r:16px; --r-sm:10px;
    --shadow:0 1px 2px rgba(16,24,40,.035), 0 8px 22px rgba(16,24,40,.055);
    --shadow-lg:0 2px 4px rgba(16,24,40,.05), 0 18px 36px rgba(16,24,40,.09);
    --side:260px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:
      radial-gradient(circle at 18% 0%, rgba(79,70,229,.07), transparent 28rem),
      linear-gradient(180deg,#f7f8fc 0%, var(--bg) 28rem);
    color:var(--ink);
    font-family:"Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,"Noto Naskh Arabic",sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.55;overflow-x:hidden}
  a{color:inherit}
  .tnum{font-variant-numeric:tabular-nums}

  /* ---------- App shell ---------- */
  .app{display:flex;min-height:100vh}
  .side{position:fixed;inset-block:0;inset-inline-start:0;width:var(--side);background:rgba(255,255,255,.88);
    border-inline-end:1px solid var(--line);display:flex;flex-direction:column;padding:18px 14px;gap:6px;z-index:40;
    box-shadow:0 0 0 1px rgba(255,255,255,.6) inset;backdrop-filter:blur(14px)}
  .main{flex:1;margin-inline-start:var(--side);padding:24px clamp(18px,2.2vw,36px) 34px;
    max-width:1900px;width:calc(100% - var(--side));min-width:0}

  /* brand */
  .brand{display:flex;align-items:center;gap:11px;padding:6px 8px 16px;margin-bottom:4px}
  .brand .mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#7c3aed);
    color:#fff;display:grid;place-items:center;font-weight:800;font-size:16px;box-shadow:var(--shadow)}
  .brand .bt{font-weight:800;font-size:15px;letter-spacing:.01em}
  .brand .bs{font-size:11px;color:var(--muted)}

  /* nav */
  .nav{display:flex;flex-direction:column;gap:6px;margin-top:4px}
  .navi{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;cursor:pointer;
    color:var(--muted);font-weight:600;font-size:14.5px;position:relative;border:1px solid transparent;
    transition:background .12s,color .12s}
  .navi:hover{background:#f4f6fb;color:var(--ink)}
  .navi.on{background:var(--accent-weak);color:var(--accent);border-color:rgba(79,70,229,.14)}
  .navi.on::before{content:"";position:absolute;inset-inline-start:0;top:9px;bottom:9px;width:3px;
    border-radius:3px;background:var(--accent)}
  .navi .ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-size:16px;
    background:#f1f4fa}
  .navi.on .ic{background:#fff}
  .navi .ct{margin-inline-start:auto;font-size:12px;font-weight:700;color:var(--muted);
    background:#f1f4fa;border-radius:20px;padding:1px 8px}
  .navi.on .ct{background:#fff;color:var(--accent)}

  .side-foot{margin-top:auto;display:flex;flex-direction:column;gap:10px;padding-top:12px;border-top:1px solid var(--line)}
  .lang{border:1px solid var(--line);background:#fff;border-radius:11px;padding:9px 12px;cursor:pointer;
    font-size:13.5px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px;justify-content:center}
  .lang:hover{background:#f4f6fb}
  .updated{font-size:11px;color:var(--muted);text-align:center}

  /* mobile top bar */
  .topbar{display:none;align-items:center;gap:12px;position:sticky;top:0;z-index:35;background:rgba(246,248,251,.9);
    backdrop-filter:blur(8px);padding:12px 16px;border-bottom:1px solid var(--line)}
  .burger{width:40px;height:40px;border-radius:11px;border:1px solid var(--line);background:#fff;font-size:18px;cursor:pointer}
  .scrim{display:none}

  /* ---------- generic ---------- */
  .page-h{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  h1{font-size:23px;margin:0;font-weight:800;letter-spacing:-.01em}
  .page-sub{color:var(--muted);font-size:13.5px;margin-top:3px}
  h3.section{font-size:12.5px;letter-spacing:.04em;color:var(--muted);text-transform:uppercase;
    margin:26px 2px 12px;font-weight:800}
  .count-pill{background:#fff;border:1px solid var(--line);border-radius:999px;padding:2px 10px;
    font-size:12px;color:var(--muted);margin-inline-start:8px;vertical-align:middle;font-weight:700}
  .back{display:inline-flex;align-items:center;gap:7px;cursor:pointer;color:var(--muted);font-weight:700;
    font-size:13.5px;margin-bottom:14px;border:1px solid var(--line);background:#fff;border-radius:10px;padding:7px 12px}
  .back:hover{background:#f4f6fb;color:var(--ink)}
  [dir=rtl] .back .ar{transform:scaleX(-1)}

  /* status banner */
  .hero-grid{display:grid;grid-template-columns:minmax(280px,.86fr) minmax(520px,1.14fr);gap:14px;align-items:stretch;margin-bottom:8px}
  .banner{border-radius:var(--r);padding:18px 20px;display:flex;align-items:center;gap:15px;
    box-shadow:var(--shadow);margin-bottom:0;border:1px solid var(--line);min-height:132px}
  .banner .dot{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;font-size:25px;flex:0 0 auto;color:#fff}
  .banner h2{margin:0;font-size:19px;font-weight:800}
  .banner p{margin:3px 0 0;color:var(--muted);font-size:13px}
  .b-good{background:linear-gradient(180deg,#fff, #f3fbf6)} .b-good .dot{background:var(--good)}
  .b-warn{background:linear-gradient(180deg,#fff,#fdf7ee)} .b-warn .dot{background:var(--warn)}

  /* number cards */
  .grid-num{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:12px;margin-bottom:0}
  .num{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);
    display:flex;flex-direction:column;justify-content:space-between;gap:8px;min-height:132px;transition:transform .12s,box-shadow .12s}
  .num:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
  .num .ic{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;font-size:17px;background:var(--accent-weak)}
  .num.t-blue .ic{background:var(--blue-weak)}
  .num.t-good .ic{background:var(--good-weak)}
  .num.t-violet .ic{background:var(--violet-weak)}
  .num.t-warn .ic{background:var(--warn-weak)}
  .num .v{font-size:30px;font-weight:850;line-height:1}
  .num .l{color:var(--muted);font-size:12.5px}

  .overview-split{display:grid;grid-template-columns:minmax(0,1fr) minmax(340px,420px);gap:16px;align-items:start;margin-top:14px}
  .overview-split h3.section{margin-top:16px}
  .overview-main,.overview-side{min-width:0}
  .value-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin:0 0 6px}
  .value-card{background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:var(--r);
    box-shadow:var(--shadow);padding:14px 15px;display:grid;grid-template-columns:34px minmax(0,1fr);gap:11px;align-items:center}
  .value-ic{width:34px;height:34px;border-radius:10px;background:var(--good-weak);color:var(--good);
    display:grid;place-items:center;font-weight:850}
  .value-v{font-size:17px;font-weight:850;line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .value-l{color:var(--muted);font-size:12px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* agent cards */
  .grid-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(235px,1fr));gap:12px}
  .agent{background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:var(--r);padding:14px;box-shadow:var(--shadow);
    display:flex;align-items:center;gap:13px;cursor:pointer;transition:transform .12s,box-shadow .12s}
  .agent:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
  .agent .av{width:42px;height:42px;border-radius:12px;flex:0 0 auto;display:grid;place-items:center;font-weight:800;
    font-size:16px;color:#fff;background:linear-gradient(135deg,#64748b,#94a3b8);position:relative}
  .agent .av.working{background:linear-gradient(135deg,#16a34a,#34d399)}
  .agent .av.attention{background:linear-gradient(135deg,#dc2626,#f87171)}
  .agent .sdot{position:absolute;inset-block-end:-2px;inset-inline-end:-2px;width:13px;height:13px;border-radius:50%;
    border:2.5px solid #fff}
  .s-working{background:var(--good)} .s-resting{background:#cbd5e1} .s-attention{background:var(--bad)}
  .agent.live .sdot.s-working{animation:pulse 2s infinite}
  .agent .nm{font-weight:700}
  .agent .rl{color:var(--muted);font-size:12.5px}
  .agent .la{color:var(--muted);font-size:11.5px;margin-top:3px}
  .agent .badges{margin-inline-start:auto;display:flex;flex-direction:column;gap:5px;align-items:flex-end;flex:0 0 auto}
  .agent .wf{font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-weak);
    border-radius:20px;padding:2px 8px;white-space:nowrap}
  .agent .wf.auto{color:var(--good);background:var(--good-weak)}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(22,163,74,.45)}70%{box-shadow:0 0 0 7px rgba(22,163,74,0)}100%{box-shadow:0 0 0 0 rgba(22,163,74,0)}}

  /* list (jobs / today) */
  .list{background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
  .overview-side .list{max-height:410px;overflow-y:auto;overflow-x:hidden}
  .row{display:flex;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);align-items:center}
  .row:last-child{border-bottom:0}
  .row.click{cursor:pointer;transition:background .1s}
  .row.click:hover{background:#f7f9fd}
  .row .when{color:var(--accent);font-weight:700;font-size:12.5px;min-width:112px;flex:0 0 auto}
  .row .tm{color:var(--accent);font-weight:700;font-size:13px;min-width:60px;flex:0 0 auto;font-variant-numeric:tabular-nums}
  .row .main{flex:1;min-width:0;margin:0;padding:0;width:auto;max-width:none}
  .row .title{font-weight:600}
  .row .desc{color:var(--muted);font-size:12.5px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .tag{background:#f1f4fa;color:var(--muted);border-radius:8px;padding:3px 9px;font-size:11.5px;white-space:nowrap;font-weight:600}
  .row .tag.impact{background:var(--good-weak);color:var(--good)}
  .row .flowtag{background:var(--accent-weak);color:var(--accent);border-radius:8px;padding:3px 9px;font-size:11.5px;
    white-space:nowrap;font-weight:700}
  .row .chev{color:#cbd5e1;font-size:18px;flex:0 0 auto}
  [dir=rtl] .row .chev{transform:scaleX(-1)}
  .overview-side .row{display:grid;grid-template-columns:58px minmax(0,1fr);align-items:start}
  .overview-side .row .tm{grid-column:1;min-width:0;padding-top:1px}
  .overview-side .row .main{grid-column:2}
  .overview-side .row .title{font-size:12.5px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .overview-side .row .desc{font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .empty{color:var(--muted);text-align:center;padding:30px;font-size:14px}

  /* automation rows */
  .automation-row{display:grid;grid-template-columns:minmax(160px,220px) minmax(0,1fr) auto;
    gap:14px;align-items:center;padding:14px 16px;border-bottom:1px solid var(--line);cursor:pointer;
    transition:background .12s,box-shadow .12s;position:relative}
  .automation-row::before{content:"";position:absolute;inset-inline-start:0;top:14px;bottom:14px;width:3px;
    border-radius:3px;background:transparent;transition:background .12s}
  .automation-row:last-child{border-bottom:0}
  .automation-row:hover{background:linear-gradient(90deg,rgba(79,70,229,.05),rgba(255,255,255,0))}
  .automation-row:hover::before{background:var(--accent)}
  .auto-schedule{display:inline-flex;align-items:center;gap:8px;min-width:0;max-width:100%;
    color:var(--accent);background:var(--accent-weak);border:1px solid rgba(79,70,229,.12);
    border-radius:999px;padding:6px 10px;font-size:12px;font-weight:800;line-height:1.2}
  .auto-schedule span:last-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .auto-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px rgba(79,70,229,.10);flex:0 0 auto}
  .auto-main{min-width:0}
  .auto-title{font-size:15.5px;font-weight:780;line-height:1.25;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .auto-desc{color:var(--muted);font-size:12.5px;line-height:1.45;margin-top:4px;display:-webkit-box;
    -webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .auto-meta{display:flex;align-items:center;gap:8px;min-width:max-content}
  .auto-tag{background:#f5f7fb;color:var(--muted);border:1px solid var(--line);border-radius:999px;
    padding:4px 9px;font-size:11.5px;white-space:nowrap;font-weight:700}
  .auto-tag.flow{background:var(--good-weak);color:var(--good);border-color:rgba(22,163,74,.14)}
  .auto-chev{color:#cbd5e1;font-size:20px;line-height:1}
  [dir=rtl] .auto-chev{transform:scaleX(-1)}

  /* channels */
  .channel-row{display:grid;grid-template-columns:42px minmax(0,1fr) auto;gap:12px;align-items:center;
    padding:14px 16px;border-bottom:1px solid var(--line)}
  .channel-row:last-child{border-bottom:0}
  .channel-ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:var(--accent-weak)}
  .channel-name{font-size:15px;font-weight:780;line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .channel-sub{color:var(--muted);font-size:12px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .channel-meta{display:flex;align-items:center;gap:8px;min-width:max-content}
  .channel-chip{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 9px;font-size:11.5px;
    font-weight:750;background:#f5f7fb;color:var(--muted);border:1px solid var(--line);white-space:nowrap}
  .channel-chip.good{background:var(--good-weak);color:var(--good);border-color:rgba(22,163,74,.14)}
  .channel-strip{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}

  /* category accordion */
  .cat-tools{display:flex;gap:8px;margin:0 2px 12px}
  .cat-tools button{border:1px solid var(--line);background:#fff;border-radius:10px;padding:7px 12px;
    font-size:12.5px;font-weight:700;color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .cat-tools button:hover{background:#f4f6fb;color:var(--ink)}
  .cat{background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);
    margin-bottom:12px;overflow:hidden;transition:box-shadow .15s,border-color .15s}
  .cat:hover{box-shadow:var(--shadow-lg)}
  .cat.open{border-color:rgba(79,70,229,.18)}
  .cat-h{display:flex;align-items:center;gap:13px;padding:14px 16px;cursor:pointer;transition:background .12s;
    user-select:none}
  .cat-h:hover{background:#f7f9fd}
  .cat-h .ci{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:18px;
    background:var(--accent-weak);flex:0 0 auto}
  .cat-h .cl{font-weight:750;font-size:15.5px}
  .cat-h .csub{color:var(--muted);font-size:12px;margin-top:1px}
  .cat-h .cc{font-size:12px;font-weight:800;color:var(--accent);background:var(--accent-weak);border-radius:20px;
    padding:2px 10px;margin-inline-start:auto}
  .cat-h .cchev{color:#cbd5e1;font-size:20px;flex:0 0 auto;transition:transform .2s}
  .cat.open .cat-h .cchev{transform:rotate(90deg)}
  [dir=rtl] .cat-h .cchev{transform:scaleX(-1)}
  [dir=rtl] .cat.open .cat-h .cchev{transform:rotate(90deg)}
  .cat-body{display:none;border-top:1px solid var(--line)}
  .cat.open .cat-body{display:block;animation:catopen .18s ease}
  @keyframes catopen{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}

  /* ---------- detail ---------- */
  .detail-head{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);
    padding:20px 22px;margin-bottom:20px;display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap}
  .detail-head .big-ic{width:54px;height:54px;border-radius:15px;display:grid;place-items:center;font-size:24px;
    background:var(--accent-weak);flex:0 0 auto}
  .detail-head h1{font-size:21px}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .chip{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:5px 11px;font-size:12.5px;font-weight:600;
    background:#f1f4fa;color:var(--muted)}
  .chip.accent{background:var(--accent-weak);color:var(--accent)}
  .chip.good{background:var(--good-weak);color:var(--good)}
  .chip.warn{background:var(--warn-weak);color:var(--warn)}
  .detail-desc{color:var(--muted);font-size:13.5px;margin-top:10px;line-height:1.6;flex-basis:100%}

  /* workflow card */
  .wfcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);
    margin-bottom:16px;overflow:hidden}
  .wfcard-h{display:flex;align-items:center;gap:12px;padding:16px 18px;cursor:pointer}
  .wfcard-h .wic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:17px;background:var(--accent-weak)}
  .wfcard-h .wt{font-weight:700}
  .wfcard-h .ws{color:var(--muted);font-size:12px;margin-top:1px}
  .wfcard-h .tgl{margin-inline-start:auto;color:var(--muted);font-size:13px;border:1px solid var(--line);
    border-radius:9px;padding:5px 10px;white-space:nowrap}
  .wfcard-b{padding:4px 18px 20px;display:none}
  .wfcard.open .wfcard-b{display:block}
  .wfcard.open .wfcard-h{border-bottom:1px solid var(--line)}
  .agent-automation-list{margin-bottom:18px}

  /* ---------- flow renderer ---------- */
  .flow{padding-top:8px}
  .step{display:grid;grid-template-columns:46px 1fr;gap:14px;position:relative;padding-bottom:16px}
  .step::before{content:"";position:absolute;inset-inline-start:22px;top:46px;bottom:-2px;width:2px;background:var(--line)}
  .step:last-child::before{display:none}
  .step-ic{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;font-size:20px;z-index:1;
    background:#f1f4fa;border:2px solid #fff;box-shadow:0 0 0 1px var(--line)}
  .ic-trigger{background:var(--accent-weak)} .ic-action{background:var(--blue-weak)}
  .ic-decision{background:var(--warn-weak)} .ic-message{background:var(--good-weak)}
  .ic-wait{background:var(--violet-weak)} .ic-stop{background:var(--slate-weak)} .ic-done{background:var(--good-weak)}
  .step-body{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 15px;box-shadow:var(--shadow);
    align-self:start}
  .step.trigger .step-body{background:linear-gradient(180deg,#fff,#f6f6ff);border-color:rgba(79,70,229,.18)}
  .step.decision .step-body{background:linear-gradient(180deg,#fff,#fdf9f1);border-color:rgba(217,119,6,.20)}
  .step-title{font-weight:650;font-size:14.5px}
  .step-sub{color:var(--muted);font-size:11.5px;margin-top:2px;text-transform:uppercase;letter-spacing:.05em;font-weight:700}
  .branches{display:flex;flex-direction:column;gap:8px;margin-top:11px}
  .branch{display:flex;align-items:center;gap:10px;border-radius:11px;padding:8px 11px;font-size:13px}
  .branch .bk{font-weight:800;white-space:nowrap}
  .branch .bv{color:inherit;opacity:.85}
  .branch.go{background:var(--good-weak);color:var(--good)}
  .branch.dead{color:var(--muted);
    background-image:repeating-linear-gradient(45deg,#f3f6fb,#f3f6fb 7px,#e9eef6 7px,#e9eef6 14px)}

  .ph{background:var(--card);border:1px dashed var(--line);border-radius:var(--r);padding:36px;text-align:center;color:var(--muted)}
  .ph .pic{font-size:34px;margin-bottom:10px}

  .loading{text-align:center;padding:80px;color:var(--muted)}

  @media (max-width:1280px){
    .hero-grid,.overview-split{grid-template-columns:1fr}
    .value-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid-num{grid-template-columns:repeat(2,minmax(140px,1fr))}
    .overview-side .list{max-height:none}
    .automation-row{grid-template-columns:minmax(135px,180px) minmax(0,1fr)}
    .auto-meta{grid-column:2;justify-content:flex-start;min-width:0;flex-wrap:wrap}
    .channel-row{grid-template-columns:42px minmax(0,1fr)}
    .channel-meta{grid-column:2;min-width:0;flex-wrap:wrap}
  }
  @media (max-width:860px){
    .side{transform:translateX(calc(var(--side) * -1));transition:transform .2s;box-shadow:var(--shadow-lg)}
    [dir=rtl] .side{transform:translateX(var(--side))}
    body.menu .side{transform:translateX(0)}
    .main{margin-inline-start:0;width:100%;padding:18px 14px 28px}
    .topbar{display:flex}
    body.menu .scrim{display:block;position:fixed;inset:0;background:rgba(15,23,42,.35);z-index:38}
  }
  @media (max-width:560px){
    .grid-num,.grid-cards,.value-grid{grid-template-columns:1fr}
    .banner{align-items:flex-start}
    .row{align-items:flex-start}
    .row .when,.row .tm{min-width:auto}
    .automation-row{grid-template-columns:1fr;gap:9px;padding:13px}
    .auto-schedule{grid-column:1 / -1;width:max-content;max-width:100%}
    .auto-main{grid-column:1;grid-row:2}
    .auto-meta{grid-column:1;grid-row:3}
    .auto-title{white-space:normal}
    .channel-row{grid-template-columns:1fr;gap:9px}
    .channel-ic{display:none}
    .channel-meta{grid-column:1}
  }
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="topbar">
  <button class="burger" onclick="toggleMenu()">☰</button>
  <strong id="tb-title" style="flex:1">لوحة المتابعة</strong>
  <button class="lang" style="padding:7px 11px" onclick="toggleLang()"><span id="tb-lang">English</span></button>
</div>
<div class="scrim" onclick="toggleMenu(false)"></div>

<div class="app">
  <aside class="side">
    <div class="brand">
      <div class="mark">M</div>
      <div><div class="bt" id="brand-t">لوحة المتابعة</div><div class="bs" id="brand-s">المساعد الذكي</div></div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="side-foot">
      <button class="lang" onclick="toggleLang()">🌐 <span id="lang-label">English</span></button>
      <div class="updated" id="updated"></div>
    </div>
  </aside>

  <main class="main">
    <div id="view"><div class="loading" id="t-loading">جارٍ التحميل…</div></div>
  </main>
</div>

<script>
// ---------------- i18n ----------------
const STR = {
  ar:{
    brandT:"لوحة المتابعة", brandS:"المساعد الذكي", langBtn:"English",
    navOverview:"نظرة عامة", navAgents:"الفريق", navJobs:"المهام المجدولة", navChannels:"القنوات",
    loading:"جارٍ التحميل…",
    good:"كل شيء يعمل", goodSub:"الفريق والمهام تعمل بشكل طبيعي",
    warn:"يحتاج انتباه", warnSub:"هناك شيء يحتاج إلى مراجعة",
    offline:"تعذّر الوصول إلى النظام", offlineSub:"تعذّر الاتصال بلوحة التحكم",
    snapshot:"نسخة منشورة", snapshotSub:"نسخة آمنة من الفريق والمهام المجدولة",
    nMessages:"تحديثات أُرسلت اليوم", nAutoRun:"مهام أُنجزت اليوم", nAutoActive:"فحوصات العمل الجارية",
    nAgents:"أعضاء فريق الذكاء الاصطناعي",
    secAgents:"الفريق", secAutos:"المهام المجدولة", secToday:"تحديثات العمل اليوم", secAttention:"يحتاج انتباهك", secValue:"قيمة اليوم",
    overviewSub:"ملخص تنفيذي سريع لما تم وما يحتاج انتباهك",
    agentsSub:"اضغط على أي عضو لرؤية سير عمله", jobsSub:"اضغط على أي مهمة لرؤية خطواتها",
    working:"يعمل", resting:"في الاستراحة", attention:"يحتاج انتباه",
    of:"من", active:"فعّالة", to:"إلى", updated:"آخر تحديث",
    back:"رجوع", workflows:"سير العمل", workflowsHere:"سير العمل الذي يتبعه",
    noWorkflow:"لا يوجد سير عمل معرّف لهذه المهمة بعد",
    noAgentWf:"لا يوجد سير عمل مرتبط بهذا العضو بعد",
    trigger:"المُشغِّل", scheduled:"حسب الجدول", continues:"يكمل بالأسفل ↓",
    goesTo:"يُرسل إلى", schedule:"التوقيت", steps:"خطوات", viewFlow:"عرض الخطوات",
    expand:"عرض", collapse:"إخفاء", hasFlow:"خطوات",
    expandAll:"فتح الكل", collapseAll:"طي الكل", autos:"مهمة", withFlow:"بمخطط",
    relatedAutos:"الفحوصات النشطة", workflowDiagrams:"مخططات سير العمل", noRelatedAutos:"لا توجد فحوصات مرتبطة", autoShort:"فحوصات", autoOne:"فحص", wfShort:"سير عمل", wfOne:"سير عمل",
    channels:"القنوات", channelsSub:"المجموعات والمحادثات المرتبطة بالفريق", noChannels:"لا توجد قنوات مرتبطة", channelShort:"قنوات", channelOne:"قناة", owner:"المسؤول",
    group:"مجموعة", chat:"محادثة", routePolicy:"سياسة الرد",
    noIssues:"لا يوجد شيء يحتاج انتباهك الآن", systemIssue:"تعذّر الاتصال بلوحة التحكم", agentIssue:"عضو يحتاج مراجعة", sentTo:"أُرسل إلى",
    snapshotNoActivity:"التحديثات اليومية الحية تبقى داخل اللوحة المحلية فقط",
    tapCat:"اضغط على أي فئة لعرض مهامها",
  },
  en:{
    brandT:"Dashboard", brandS:"Smart Assistant", langBtn:"عربي",
    navOverview:"Overview", navAgents:"Team", navJobs:"Automations", navChannels:"Channels",
    loading:"Loading…",
    good:"Everything is running", goodSub:"Your team and tasks are working normally",
    warn:"Needs attention", warnSub:"Something needs a look",
    offline:"System unreachable", offlineSub:"Could not connect to the control panel",
    snapshot:"Published snapshot", snapshotSub:"Safe public view of the team and scheduled work",
    nMessages:"Updates sent today", nAutoRun:"Tasks completed today", nAutoActive:"Business checks running",
    nAgents:"AI team members",
    secAgents:"Your Team", secAutos:"Scheduled Automations", secToday:"Today's Business Updates", secAttention:"Needs Your Attention", secValue:"Value Today",
    overviewSub:"A daily executive brief of what was handled and what needs your attention",
    agentsSub:"Tap any member to see the workflows they follow", jobsSub:"Tap any automation to see its steps",
    working:"working", resting:"resting", attention:"needs attention",
    of:"of", active:"active", to:"to", updated:"updated",
    back:"Back", workflows:"workflows", workflowsHere:"Workflows it follows",
    noWorkflow:"No workflow defined for this automation yet",
    noAgentWf:"No workflow linked to this member yet",
    trigger:"Trigger", scheduled:"On schedule", continues:"continues below ↓",
    goesTo:"Goes to", schedule:"Schedule", steps:"steps", viewFlow:"View steps",
    expand:"Show", collapse:"Hide", hasFlow:"Workflow",
    expandAll:"Expand all", collapseAll:"Collapse all", autos:"automations", withFlow:"with steps",
    relatedAutos:"Active checks", workflowDiagrams:"Workflow diagrams", noRelatedAutos:"No related checks", autoShort:"checks", autoOne:"check", wfShort:"workflows", wfOne:"workflow",
    channels:"Channels", channelsSub:"Bound groups and chats for the team", noChannels:"No bound channels", channelShort:"channels", channelOne:"channel", owner:"Owner",
    group:"Group", chat:"Chat", routePolicy:"Policy",
    noIssues:"Nothing needs your attention right now", systemIssue:"Control panel is unreachable", agentIssue:"Team member needs review", sentTo:"Sent to",
    snapshotNoActivity:"Live daily updates stay on the local dashboard",
    tapCat:"Tap any category to see its automations",
  }
};
const ICONS = { trigger:"⏰", action:"🔍", decision:"❓", message:"💬", wait:"⏳", stop:"🔕", done:"✅" };
const NAV_IC = { overview:"▦", agents:"👥", jobs:"⏰", channels:"💬" };

let lang = localStorage.getItem('bossLang') || 'ar';
let data = null;          // /api/summary
let flows = {};           // /api/workflows
let view = { name:'overview' };

function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function t(){ return STR[lang]; }
function L(o){ return o ? (o[lang]!=null?o[lang]:(o.en||'')) : ''; }

// ---------------- chrome ----------------
function toggleMenu(force){ document.body.classList.toggle('menu', force===undefined?undefined:force); }
function toggleLang(){ lang = (lang==='ar')?'en':'ar'; localStorage.setItem('bossLang',lang); applyLang(); render(); }
function applyLang(){
  document.documentElement.lang = lang;
  document.documentElement.dir = (lang==='ar')?'rtl':'ltr';
  const x=t();
  document.getElementById('lang-label').textContent = x.langBtn;
  document.getElementById('tb-lang').textContent = x.langBtn;
  document.getElementById('brand-t').textContent = x.brandT;
  document.getElementById('brand-s').textContent = x.brandS;
  document.getElementById('tb-title').textContent = x.brandT;
  document.title = x.brandT;
}
function go(name, arg){ view = {name, arg}; toggleMenu(false); window.scrollTo(0,0); render(); }

function navActive(){
  if(view.name==='agents'||view.name==='agent') return 'agents';
  if(view.name==='jobs'||view.name==='job') return 'jobs';
  return 'overview';
}
function renderNav(){
  const x=t(), act=navActive();
  const items=[
    {k:'overview', label:x.navOverview},
    {k:'agents',   label:x.navAgents, ct:data?data.agents.length:''},
    {k:'jobs',     label:x.navJobs,   ct:data?data.numbers.activeAutomations:''},
  ];
  document.getElementById('nav').innerHTML = items.map(i=>`
    <div class="navi ${i.k===act?'on':''}" onclick="go('${i.k}')">
      <span class="ic">${NAV_IC[i.k]}</span><span>${i.label}</span>
      ${i.ct!==''&&i.ct!=null?`<span class="ct tnum">${i.ct}</span>`:''}
    </div>`).join('');
}

// ---------------- shared pieces ----------------
function areaIcon(area){
  return ({procurement:'📦',accounts:'💰',sales:'📈',delivery:'🚚',marketing:'📣',
           projects:'🏗️',rental:'🏢',fleet:'🛻',hr:'👤',main:'⭐'})[area] || '🤖';
}
function statusBanner(){
  const x=t(); let cls,icon,head,sub;
  if(data.sourceMode==='snapshot'){ cls='b-good'; icon='✓'; head=x.snapshot; sub=x.snapshotSub; }
  else if(!data.mcReachable){ cls='b-warn'; icon='!'; head=x.offline; sub=x.offlineSub; }
  else if(data.overallStatus==='good'){ cls='b-good'; icon='✓'; head=x.good; sub=x.goodSub; }
  else { cls='b-warn'; icon='!'; head=x.warn; sub=x.warnSub; }
  return `<div class="banner ${cls}"><div class="dot">${icon}</div><div><h2>${head}</h2><p>${sub}</p></div></div>`;
}
function numbersGrid(){
  const x=t(), n=data.numbers;
  const cards=[
    {ic:'💬',v:n.messagesSentToday,l:x.nMessages,t:'t-good'},
    {ic:'👥',v:n.agentsTotal,l:x.nAgents,t:'t-blue'},
    {ic:'⏰',v:n.activeAutomations,l:x.nAutoActive,t:''},
    {ic:'✅',v:n.automationsRunToday,l:x.nAutoRun,t:'t-violet'},
  ];
  return `<div class="grid-num">`+cards.map(c=>`<div class="num ${c.t}">
    <div class="ic">${c.ic}</div><div class="v tnum">${esc(c.v)}</div><div class="l">${esc(c.l)}</div></div>`).join('')+`</div>`;
}
function valueGrid(){
  const cards = data.valueToday || [];
  if(!cards.length) return '';
  return `<div class="value-grid">`+cards.map(c=>`<div class="value-card">
    <div class="value-ic">${esc(c.icon||'')}</div>
    <div style="min-width:0">
      <div class="value-v">${esc(L(c.value)||c.value||'')}</div>
      <div class="value-l">${esc(L(c.label)||c.label||'')}</div>
    </div>
  </div>`).join('')+`</div>`;
}
function jobTitle(j){ return L(j.displayName) || j.name || ''; }
function jobDesc(j){ return L(j.displayDescription) || j.description || ''; }
function countLabel(n, one, many){ return `${n} ${Number(n)===1 ? one : many}`; }
function workflowIdsForArea(area){
  return new Set(Object.entries(flows||{})
    .filter(([k,w])=>k[0]!=='_' && w && w.area===area)
    .map(([id])=>id));
}
function visibleChecksForArea(area){
  const workflowIds = workflowIdsForArea(area);
  return (data.automations||[])
    .filter(j => (j.relatedAreas||[]).includes(area) && !workflowIds.has(j.id));
}
function agentCard(a){
  const x=t(), label=x[a.state]||a.state;
  const initial = esc((a.name||'?').trim().charAt(0));
  const autoCount = visibleChecksForArea(a.area).length;
  const flowCount = Number(a.workflowCount||0);
  return `<div class="agent live" onclick="go('agent','${esc(a.area)}')">
    <div class="av ${a.state}">${initial}<span class="sdot s-${a.state}" title="${label}"></span></div>
    <div style="min-width:0">
      <div class="nm">${esc(a.name)}</div>
      <div class="rl">${esc(L(a.summary)||L(a.role))}</div>
      <div class="la">${esc(L(a.lastActive))}</div>
    </div>
    ${(autoCount||flowCount)?`<div class="badges">
      ${autoCount?`<span class="wf auto">${countLabel(autoCount, x.autoOne, x.autoShort)}</span>`:''}
      ${flowCount?`<span class="wf">${countLabel(flowCount, x.wfOne, x.wfShort)}</span>`:''}
    </div>`:''}
  </div>`;
}
function jobRow(j){
  const x=t();
  const title = jobTitle(j), desc = jobDesc(j);
  return `<div class="automation-row" onclick="go('job','${esc(j.id)}')">
    <div class="auto-schedule"><span class="auto-dot"></span><span>${esc(L(j.when)||x.scheduled)}</span></div>
    <div class="auto-main"><div class="auto-title">${esc(title)}</div>
      ${desc?`<div class="auto-desc">${esc(desc)}</div>`:''}</div>
    <div class="auto-meta">
      ${j.hasWorkflow?`<span class="auto-tag flow">${x.hasFlow}</span>`:''}
      ${j.area?`<span class="auto-tag">${esc(j.area)}</span>`:''}
      <span class="auto-chev">›</span>
    </div>
  </div>`;
}
function channelsForArea(area){
  return (data.channels||[]).filter(c=>c.areaKey===area);
}
function channelIcon(c){
  if(c.channel==='whatsapp') return c.kind==='group'?'💬':'☏';
  return '✉';
}
function channelRow(c){
  const x=t();
  const kind = c.kind==='group' ? x.group : x.chat;
  const healthy = c.kind==='group' || c.policy==='reply allowed';
  return `<div class="channel-row">
    <div class="channel-ic">${channelIcon(c)}</div>
    <div style="min-width:0">
      <div class="channel-name">${esc(c.name)}</div>
      <div class="channel-sub">${esc(c.peer)} · ${esc(c.channel)}</div>
    </div>
    <div class="channel-meta">
      <span class="channel-chip">${kind}</span>
      ${c.owner?`<span class="channel-chip">${esc(c.owner)}</span>`:''}
      <span class="channel-chip ${healthy?'good':''}">${esc(c.policy)}</span>
      ${c.relatedAutomations?`<span class="channel-chip">${countLabel(c.relatedAutomations, x.autoOne, x.autoShort)}</span>`:''}
    </div>
  </div>`;
}
function channelStrip(area){
  const x=t();
  const mine = channelsForArea(area);
  if(!mine.length) return '';
  return `<div class="channel-strip">${mine.slice(0,8).map(c=>`<span class="channel-chip good">${channelIcon(c)} ${esc(c.name)}</span>`).join('')}
    ${mine.length>8?`<span class="channel-chip">+${mine.length-8}</span>`:''}</div>`;
}

// open/closed state for category accordions (kept across the 30s auto-refresh)
let openCats = new Set();
function toggleCat(key){
  if(openCats.has(key)) openCats.delete(key); else openCats.add(key);
  const el=document.getElementById('cat-'+key);
  if(el) el.classList.toggle('open', openCats.has(key));
}
function activeCatKeys(){ return ((data&&data.categories)||[]).map(c=>c.key); }
function expandAll(){ openCats = new Set(activeCatKeys()); render(); }
function collapseAll(){ openCats = new Set(); render(); }

// group automations by their auto-assigned category as expandable cards
function jobsByCategory(jobs, opts){
  const x=t();
  const cats = (data&&data.categories)||[];
  const order = cats.length ? cats : [{key:'other',en:'Other',ar:'أخرى',icon:'🤖'}];
  let h = (opts&&opts.tools) ? `<div class="cat-tools">
      <button onclick="expandAll()">⊕ ${x.expandAll}</button>
      <button onclick="collapseAll()">⊖ ${x.collapseAll}</button></div>` : '';
  for(const c of order){
    const mine = jobs.filter(j=>j.category && j.category.key===c.key)
      .sort((a,b)=> (b.hasWorkflow?1:0)-(a.hasWorkflow?1:0) || jobTitle(a).localeCompare(jobTitle(b)));
    if(!mine.length) continue;
    const wfCount = mine.filter(j=>j.hasWorkflow).length;
    const sub = wfCount ? `${mine.length} ${x.autos} · ${wfCount} ${x.withFlow}` : `${mine.length} ${x.autos}`;
    const open = openCats.has(c.key);
    h += `<div class="cat ${open?'open':''}" id="cat-${esc(c.key)}">
      <div class="cat-h" onclick="toggleCat('${esc(c.key)}')">
        <span class="ci">${c.icon||'🤖'}</span>
        <div style="min-width:0"><div class="cl">${esc(L(c))}</div><div class="csub">${sub}</div></div>
        <span class="cc tnum">${mine.length}</span>
        <span class="cchev">›</span>
      </div>
      <div class="cat-body">${mine.map(jobRow).join('')}</div>
    </div>`;
  }
  return h || `<div class="empty">${x.secAutos}</div>`;
}

// ---------------- flow renderer ----------------
function flowStep(icon, type, body){
  return `<div class="step ${type}"><div class="step-ic ic-${type}">${icon}</div>
    <div class="step-body">${body}</div></div>`;
}
function renderFlow(wf, whenObj){
  const x=t();
  let h='<div class="flow">';
  h += flowStep(ICONS.trigger,'trigger',
        `<div class="step-sub">${x.trigger}</div><div class="step-title">${esc(L(whenObj)||x.scheduled)}</div>`);
  for(const n of (wf.nodes||[])){
    if(n.type==='decision'){
      const go = (n.branches||[]).find(b=>b.continue);
      const dead = (n.branches||[]).find(b=>b.terminal);
      let br='<div class="branches">';
      if(go) br+=`<div class="branch go"><span class="bk">✓ ${esc(L(go.label))}</span><span class="bv">${x.continues}</span></div>`;
      if(dead) br+=`<div class="branch dead"><span class="bk">✗ ${esc(L(dead.label))}</span><span class="bv">${esc(L(dead.terminal))}</span></div>`;
      br+='</div>';
      h += flowStep(ICONS.decision,'decision',`<div class="step-title">${esc(L(n.q))}</div>${br}`);
    } else {
      h += flowStep(ICONS[n.type]||'•', n.type, `<div class="step-title">${esc(L(n))}</div>`);
    }
  }
  h+='</div>';
  return h;
}
function nodeCount(wf){ return (wf.nodes||[]).filter(n=>n.type!=='stop'&&n.type!=='done').length; }
function jobById(id){ return (data&&data.automations||[]).find(j=>j.id===id); }

// collapsible workflow card (used in agent detail)
function wfCard(id, wf, open){
  const x=t(), job=jobById(id);
  return `<div class="wfcard ${open?'open':''}" id="wf-${esc(id)}">
    <div class="wfcard-h" onclick="document.getElementById('wf-${esc(id)}').classList.toggle('open')">
      <span class="wic">${areaIcon(wf.area)}</span>
      <div><div class="wt">${esc(L(wf.title))}</div>
        <div class="ws">${esc(job?L(job.when):x.scheduled)} · ${nodeCount(wf)} ${x.steps}</div></div>
      <span class="tgl">${x.viewFlow}</span>
    </div>
    <div class="wfcard-b">${renderFlow(wf, job?job.when:null)}</div>
  </div>`;
}

// ---------------- views ----------------
function viewOverview(){
  const x=t();
  const todayRows = data.activity || [];
  const today = todayRows.length
    ? `<div class="list">`+todayRows.map(a=>{
        const headline = L(a.headline) || a.text || '';
        const impact = L(a.impact) || '';
        const target = a.to ? `${x.sentTo} ${a.to}` : '';
        return `<div class="row"><div class="tm">${esc(a.time)}</div>
          <div class="main"><div class="title">${esc(headline)}</div>${target?`<div class="desc">${esc(target)}</div>`:''}</div>
          ${impact?`<span class="tag impact">${esc(impact)}</span>`:''}</div>`;
      }).join('')+`</div>`
    : `<div class="empty">${data.sourceMode==='snapshot' ? x.snapshotNoActivity : x.secToday}</div>`;
  const issues = (data.attentionItems && data.attentionItems.length)
    ? data.attentionItems
    : ((data.sourceMode==='offline') ? [{title:{en:x.systemIssue,ar:x.systemIssue}, desc:{en:x.offlineSub,ar:x.offlineSub}, tag:{en:x.attention,ar:x.attention}}] : []);
  const attention = issues.length
    ? `<div class="list">`+issues.map(i=>`<div class="row"><div class="tm">!</div>
        <div class="main"><div class="title">${esc(L(i.title)||i.title)}</div>${i.desc?`<div class="desc">${esc(L(i.desc)||i.desc)}</div>`:''}</div>
        <span class="tag">${esc(L(i.tag)||i.tag)}</span></div>`).join('')+`</div>`
    : `<div class="empty">${x.noIssues}</div>`;
  return `<div class="page-h"><div><h1>${x.navOverview}</h1><div class="page-sub">${x.overviewSub}</div></div></div>`
    + `<div class="hero-grid">${statusBanner()}${numbersGrid()}</div>`
    + `<h3 class="section">${x.secValue}</h3>${valueGrid()}`
    + `<div class="overview-split"><section class="overview-main"><h3 class="section">${x.secToday}</h3>${today}</section>`
    + `<section class="overview-side"><h3 class="section">${x.secAttention}</h3>${attention}</section></div>`;
}
function viewAgents(){
  const x=t();
  return `<div class="page-h"><div><h1>${x.secAgents}</h1><div class="page-sub">${x.agentsSub}</div></div></div>`
    + `<div class="grid-cards">${data.agents.map(agentCard).join('')}</div>`;
}
function viewJobs(){
  const x=t(), n=data.numbers;
  return `<div class="page-h"><div><h1>${x.navJobs}</h1><div class="page-sub">${x.tapCat}</div></div>
      <span class="count-pill">${n.activeAutomations} ${x.of} ${n.totalAutomations} ${x.active}</span></div>`
    + jobsByCategory(data.automations, {tools:true});
}
function viewChannels(){
  const x=t();
  const rows = (data.channels||[]).length
    ? `<div class="list">${data.channels.map(channelRow).join('')}</div>`
    : `<div class="empty">${x.noChannels}</div>`;
  return `<div class="page-h"><div><h1>${x.navChannels}</h1><div class="page-sub">${x.channelsSub}</div></div>
      <span class="count-pill">${(data.channels||[]).length} ${x.channelShort}</span></div>${rows}`;
}
function viewAgentDetail(area){
  const x=t();
  const ag = data.agents.find(a=>a.area===area) || {name:area, role:{en:area,ar:area}, state:'resting', lastActive:{en:'',ar:''}};
  const mine = Object.entries(flows).filter(([k,w])=>k[0]!=='_' && w && w.area===area);
  const related = visibleChecksForArea(area)
    .sort((a,b)=> jobTitle(a).localeCompare(jobTitle(b)));
  const autoBody = related.length
    ? `<div class="list agent-automation-list">${related.map(jobRow).join('')}</div>`
    : `<div class="empty">${x.noRelatedAutos}</div>`;
  const flowBody = mine.length
    ? mine.map(([id,w],i)=>wfCard(id,w,i===0)).join('')
    : `<div class="ph"><div class="pic">🗺️</div>${x.noAgentWf}</div>`;
  const myChannels = channelsForArea(area);
  const label = x[ag.state]||ag.state;
  return `<div class="back" onclick="go('agents')"><span class="ar">←</span> ${x.back}</div>
    <div class="detail-head">
      <div class="big-ic">${areaIcon(area)}</div>
      <div style="flex:1;min-width:0">
        <h1>${esc(ag.name)}</h1>
        <div class="chips">
          <span class="chip">${esc(L(ag.role))}</span>
          <span class="chip ${ag.state==='working'?'good':(ag.state==='attention'?'warn':'')}">● ${label}</span>
          <span class="chip accent">${countLabel(mine.length, x.wfOne, x.wfShort)}</span>
          <span class="chip good">${countLabel(related.length, x.autoOne, x.autoShort)}</span>
          <span class="chip">${countLabel(myChannels.length, x.channelOne, x.channelShort)}</span>
          ${ag.lastActive?`<span class="chip">${esc(L(ag.lastActive))}</span>`:''}
        </div>
      </div>
    </div>
    <h3 class="section">${x.workflowDiagrams}<span class="count-pill">${mine.length}</span></h3>
    ${flowBody}
    <h3 class="section">${x.relatedAutos}<span class="count-pill">${related.length}</span></h3>
    ${autoBody}
    <h3 class="section">${x.channels}<span class="count-pill">${myChannels.length}</span></h3>
    ${myChannels.length?channelStrip(area):`<div class="empty">${x.noChannels}</div>`}`;
}
function viewJobDetail(id){
  const x=t();
  const job = jobById(id) || {name:id, when:{en:'',ar:''}, description:'', area:''};
  const wf = flows[id];
  const recip = wf && wf.recipients ? `<span class="chip accent">${x.goesTo}: ${esc(L(wf.recipients))}</span>` : '';
  const routeArea = (job.relatedAreas && job.relatedAreas[0]) || job.areaKey || (wf&&wf.area) || '';
  const routes = channelsForArea(routeArea);
  const body = wf
    ? renderFlow(wf, job.when)
    : `<div class="ph"><div class="pic">🗺️</div>${x.noWorkflow}</div>`;
  return `<div class="back" onclick="go('jobs')"><span class="ar">←</span> ${x.back}</div>
    <div class="detail-head">
      <div class="big-ic">${wf?areaIcon(wf.area):'⏰'}</div>
      <div style="flex:1;min-width:0">
        <h1>${esc((wf&&L(wf.title)) || jobTitle(job))}</h1>
        <div class="chips">
          <span class="chip accent">⏰ ${esc(L(job.when)||x.scheduled)}</span>
          ${job.area?`<span class="chip">${esc(job.area)}</span>`:''}
          ${recip}
          ${routes.slice(0,3).map(c=>`<span class="chip">${channelIcon(c)} ${esc(c.name)}</span>`).join('')}
        </div>
        ${jobDesc(job)?`<div class="detail-desc">${esc(jobDesc(job))}</div>`:''}
      </div>
    </div>
    ${body}`;
}

// ---------------- render ----------------
function render(){
  if(!data){ return; }
  renderNav();
  const el=document.getElementById('view');
  let html='';
  if(view.name==='agents') html=viewAgents();
  else if(view.name==='jobs') html=viewJobs();
  else if(view.name==='agent') html=viewAgentDetail(view.arg);
  else if(view.name==='job') html=viewJobDetail(view.arg);
  else html=viewOverview();
  el.innerHTML=html;
  document.getElementById('updated').textContent = `${t().updated}: ${data.generatedAt||''}`;
}

async function load(){
  try{
    const [s,w] = await Promise.all([
      fetch('/api/summary',{cache:'no-store'}).then(r=>{if(!r.ok)throw 0;return r.json()}),
      fetch('/api/workflows',{cache:'no-store'}).then(r=>r.ok?r.json():{}).catch(()=>({})),
    ]);
    data=s; flows=w||{}; render();
  }catch(e){
    document.getElementById('view').innerHTML =
      `<div class="banner b-warn"><div class="dot">!</div><div><h2>${t().offline}</h2><p>${t().offlineSub}</p></div></div>`;
  }
}

applyLang();
load();
setInterval(load, 30000);
</script>
</body>
</html>
